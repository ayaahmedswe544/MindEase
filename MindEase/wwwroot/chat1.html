<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
</head>
<body>
    <h1>User Chat</h1>

    <input id="bookingId" placeholder="Booking Id" />
    <button onclick="join()">Join Chat</button>

    <br /><br />

    <input id="message" placeholder="Message" />
    <button onclick="send()">Send</button>

    <ul id="messages" style="list-style:none; padding:0;"></ul>
    <div id="seenLabel" style="display:none; color: gray; margin-top:10px;">Seen</div>

    <script>
        const token = "";

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("https://localhost:7200/hubs/chat", { accessTokenFactory: () => token })
            .build();

        let currentBookingId = null;


        let lastMessageWasMine = false;

        function renderMessage(msg) {
            const li = document.createElement("li");
            const sentAt = msg.sentAt || msg.SentAt;
            const senderType = msg.messageSenderType ?? msg.MessageSenderType;

            const time = sentAt ? new Date(sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Unknown Time";
            const senderMap = { 0: "User", 1: "Doctor" };
            const sender = senderMap[senderType] || "Unknown";

            li.textContent = `[${time}] ${sender} : ${msg.content || msg.Content || ""}`;
            li.style.color = senderType === 0 ? "blue" : "green";
            if (senderType === 0) li.style.fontWeight = "bold";

            document.getElementById("messages").appendChild(li);
            li.scrollIntoView({ behavior: "smooth" });
            if (!lastMessageWasMine) {
                if (currentBookingId) {
                    connection.invoke("MarkAsRead", currentBookingId).catch(console.error);
                }
            }
        }
        connection.on("ReceiveMessage", (msg) => {
            const senderType = msg.messageSenderType ?? msg.MessageSenderType;
            renderMessage(msg);
            if (senderType !== (lastMessageWasMine ? 0 : 1)) {
                lastMessageWasMine = false;
            }
        });

        connection.on("LoadMessages", (messages) => {
            const ul = document.getElementById("messages");
            ul.innerHTML = "";
            messages.forEach(msg => renderMessage(msg));
        });

        connection.on("ChatSeen", () => {
            if (lastMessageWasMine) {
                const seenLabel = document.getElementById("seenLabel");
                seenLabel.style.display = "block";
            }
        });

        connection.start().then(() => console.log("✅ Connected")).catch(console.error);

        function join() {
            const bookingId = parseInt(document.getElementById("bookingId").value);
            if (!bookingId) return alert("Enter a valid booking ID.");

            currentBookingId = bookingId;
            document.getElementById("seenLabel").style.display = "none";

            connection.invoke("JoinChat", bookingId)
                .then(() => {
                    connection.invoke("LoadMessages", bookingId);
                    connection.invoke("MarkAsRead", bookingId).catch(console.error);
                }).catch(console.error);
        }
        function send() {
            const bookingId = parseInt(document.getElementById("bookingId").value);
            const message = document.getElementById("message").value;
            if (!message || !bookingId) return;

            lastMessageWasMine = true;
            document.getElementById("seenLabel").style.display = "none";

            connection.invoke("SendMessage", bookingId, message).catch(console.error);
            document.getElementById("message").value = "";
        }
    </script>
</body>
</html>
